<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- xAI-style contract/code icon - minimal line-based -->
  <rect width="400" height="400" fill="#0c0c0b"/>
  
  <!-- Document outline -->
  <rect x="80" y="60" width="240" height="280" rx="4" stroke="#1f2228" stroke-width="2" fill="none"/>
  
  <!-- Code lines with electric blue accent -->
  <line x1="120" y1="120" x2="200" y2="120" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
  <line x1="120" y1="160" x2="280" y2="160" stroke="#474747" stroke-width="2" stroke-linecap="round"/>
  <line x1="120" y1="180" x2="260" y2="180" stroke="#474747" stroke-width="2" stroke-linecap="round"/>
  <line x1="120" y1="200" x2="240" y2="200" stroke="#474747" stroke-width="2" stroke-linecap="round"/>
  
  <line x1="120" y1="240" x2="180" y2="240" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
  <line x1="120" y1="260" x2="270" y2="260" stroke="#474747" stroke-width="2" stroke-linecap="round"/>
  <line x1="120" y1="280" x2="250" y2="280" stroke="#474747" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Brackets for code feel -->
  <path d="M 140 140 L 130 150 L 140 160" stroke="#7d8187" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 270 220 L 280 230 L 270 240" stroke="#7d8187" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Subtle glow -->
  <circle cx="200" cy="200" r="120" fill="url(#glow)" opacity="0.3"/>
  
  <defs>
    <radialGradient id="glow">
      <stop offset="0%" style="stop-color:rgba(37,99,235,0.1);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(37,99,235,0);stop-opacity:0" />
    </radialGradient>
  </defs>
</svg>
