<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- xAI-style placeholder - minimal abstract -->
  <rect width="800" height="600" fill="#0c0c0b"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="placeholderGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <rect width="800" height="600" fill="url(#placeholderGrid)"/>
  
  <!-- Center icon -->
  <circle cx="400" cy="300" r="60" stroke="#1f2228" stroke-width="2" fill="none"/>
  <circle cx="400" cy="300" r="40" stroke="#474747" stroke-width="1.5" fill="none"/>
  
  <!-- Abstract shape -->
  <path d="M 380 280 L 400 260 L 420 280 L 420 320 L 400 340 L 380 320 Z" 
        stroke="#2563eb" stroke-width="2" fill="none"/>
  
  <!-- Subtle glow -->
  <circle cx="400" cy="300" r="100" fill="url(#placeholderGlow)" opacity="0.2"/>
  
  <defs>
    <radialGradient id="placeholderGlow">
      <stop offset="0%" style="stop-color:rgba(37,99,235,0.2);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(37,99,235,0);stop-opacity:0" />
    </radialGradient>
  </defs>
</svg>
