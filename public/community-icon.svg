<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- xAI-style community/network icon -->
  <rect width="400" height="400" fill="#0c0c0b"/>
  
  <!-- Network nodes -->
  <circle cx="200" cy="120" r="20" stroke="#2563eb" stroke-width="3" fill="none"/>
  <circle cx="120" cy="200" r="18" stroke="#474747" stroke-width="2" fill="none"/>
  <circle cx="280" cy="200" r="18" stroke="#474747" stroke-width="2" fill="none"/>
  <circle cx="160" cy="280" r="16" stroke="#474747" stroke-width="2" fill="none"/>
  <circle cx="240" cy="280" r="16" stroke="#474747" stroke-width="2" fill="none"/>
  
  <!-- Connection lines -->
  <line x1="200" y1="140" x2="130" y2="185" stroke="#1f2228" stroke-width="2"/>
  <line x1="200" y1="140" x2="270" y2="185" stroke="#1f2228" stroke-width="2"/>
  <line x1="120" y1="218" x2="160" y2="265" stroke="#1f2228" stroke-width="2"/>
  <line x1="280" y1="218" x2="240" y2="265" stroke="#1f2228" stroke-width="2"/>
  <line x1="138" y1="205" x2="265" y2="195" stroke="#1f2228" stroke-width="1.5"/>
  <line x1="175" y1="280" x2="225" y2="280" stroke="#1f2228" stroke-width="1.5"/>
  
  <!-- Center node highlight -->
  <circle cx="200" cy="120" r="8" fill="#2563eb" opacity="0.5"/>
  
  <!-- Pulse rings -->
  <circle cx="200" cy="120" r="35" stroke="#2563eb" stroke-width="1" opacity="0.2" fill="none"/>
  <circle cx="200" cy="120" r="50" stroke="#2563eb" stroke-width="0.5" opacity="0.1" fill="none"/>
  
  <!-- Data flow indicators -->
  <circle cx="165" cy="160" r="3" fill="#7d8187"/>
  <circle cx="235" cy="160" r="3" fill="#7d8187"/>
  <circle cx="140" cy="240" r="2" fill="#7d8187"/>
  <circle cx="260" cy="240" r="2" fill="#7d8187"/>
  
  <!-- Ambient glow -->
  <circle cx="200" cy="200" r="150" fill="url(#communityGlow)" opacity="0.15"/>
  
  <defs>
    <radialGradient id="communityGlow">
      <stop offset="0%" style="stop-color:rgba(37,99,235,0.2);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(37,99,235,0);stop-opacity:0" />
    </radialGradient>
  </defs>
</svg>
