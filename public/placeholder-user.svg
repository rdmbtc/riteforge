<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- xAI-style user avatar placeholder -->
  <rect width="200" height="200" fill="#0c0c0b"/>
  
  <!-- User silhouette - minimal -->
  <circle cx="100" cy="70" r="30" stroke="#474747" stroke-width="2" fill="none"/>
  <path d="M 60 140 Q 60 110 100 110 Q 140 110 140 140 L 140 160 L 60 160 Z" 
        stroke="#474747" stroke-width="2" fill="none"/>
  
  <!-- Accent circle -->
  <circle cx="100" cy="100" r="80" stroke="#1f2228" stroke-width="2" fill="none"/>
  
  <!-- Subtle glow -->
  <circle cx="100" cy="100" r="60" fill="url(#userGlow)" opacity="0.15"/>
  
  <defs>
    <radialGradient id="userGlow">
      <stop offset="0%" style="stop-color:rgba(37,99,235,0.3);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(37,99,235,0);stop-opacity:0" />
    </radialGradient>
  </defs>
</svg>
